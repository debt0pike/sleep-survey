<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>睡眠健康评估 · 大萌博士</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
body{display:flex;justify-content:center;align-items:flex-start;min-height:100%}
#app{width:100%;max-width:480px;min-height:100vh;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ===== SCREENS ===== */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;background:#fff;will-change:transform;transition:transform 0.32s cubic-bezier(0.4,0,0.2,1)}
.screen.hidden{display:none}
.screen.slide-in-right{transform:translateX(100%)}
.screen.slide-out-left{transform:translateX(-100%)}
.screen.slide-in-left{transform:translateX(-100%)}
.screen.slide-out-right{transform:translateX(100%)}
.screen.active{transform:translateX(0)}

/* ===== COVER ===== */
#screen-cover{background:linear-gradient(160deg,#3d6644 0%,#6B8F71 60%,#8aab8f 100%);color:#fff;justify-content:center;align-items:center;padding:48px 32px}
.cover-logo{font-size:15px;opacity:0.8;margin-bottom:20px;letter-spacing:1px;text-align:center}
.cover-title{font-size:36px;font-weight:700;line-height:1.2;margin-bottom:8px;text-align:center}
.cover-sub{font-size:16px;opacity:0.85;margin-bottom:40px;text-align:center}
.cover-bullets{background:rgba(255,255,255,0.15);border-radius:16px;padding:20px 22px;margin-bottom:44px;width:100%}
.cover-bullets li{list-style:none;font-size:15px;line-height:1.8;padding-left:20px;position:relative;opacity:0.92}
.cover-bullets li::before{content:'·';position:absolute;left:4px;font-size:22px;line-height:1.4}
.btn-start{background:#fff;color:#4a7050;border:none;border-radius:50px;font-size:18px;font-weight:700;padding:18px 60px;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.btn-start:active{opacity:0.85;transform:scale(0.97)}

/* ===== CHAPTER OVERVIEW ===== */
#screen-chapters{background:#F5F5F5;padding:0;overflow:hidden}
.chapters-header{padding:44px 24px 18px;background:#F5F5F5;flex-shrink:0}
.chapters-header h2{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.chapters-header p{font-size:15px;color:#888}
.chapter-cards-wrap{flex:1;overflow-y:auto;padding:4px 20px 140px}
.chapter-card{background:#fff;border-radius:16px;padding:18px 20px;display:flex;align-items:flex-start;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:12px}
.chapter-num{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6B8F71,#4a7050);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chapter-info h3{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.chapter-info p{font-size:13px;color:#999;line-height:1.5}
.chapters-footer{position:absolute;bottom:0;left:0;right:0;padding:20px 24px 40px;background:linear-gradient(transparent,#F5F5F5 40%)}
.btn-chapters-start{width:100%;background:linear-gradient(135deg,#6B8F71,#4a7050);color:#fff;border:none;border-radius:16px;font-size:18px;font-weight:700;padding:18px;cursor:pointer;box-shadow:0 4px 16px rgba(74,112,80,0.35)}
.btn-chapters-start:active{opacity:0.85}

/* ===== CHAPTER TRANSITION ===== */
#screen-chapter-transition{background:linear-gradient(160deg,#3d6644 0%,#6B8F71 100%);color:#fff;justify-content:center;align-items:center;z-index:100}
.ct-num{font-size:15px;opacity:0.75;letter-spacing:2px;margin-bottom:12px;text-align:center}
.ct-title{font-size:30px;font-weight:700;text-align:center;padding:0 32px;line-height:1.4}

/* ===== QUESTION SCREEN ===== */
#screen-question{flex-direction:column}
.top-bar{padding:12px 16px 10px;flex-shrink:0;background:#fff;position:relative;z-index:10;box-shadow:0 1px 0 #f0f0f0}
.top-bar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.btn-back{background:none;border:none;color:#4a7050;font-size:15px;padding:8px 4px;cursor:pointer;display:flex;align-items:center;gap:4px;min-height:44px;font-weight:500}
.btn-back:active{opacity:0.6}
.progress-pct{font-size:13px;color:#6B8F71;font-weight:600;min-width:36px;text-align:right}
.progress-bar-wrap{height:3px;background:#E8E8E8;border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#6B8F71,#4a7050);border-radius:3px;transition:width 0.4s ease}

.q-body{flex:1;overflow-y:auto;padding:24px 24px 0;-webkit-overflow-scrolling:touch}
.q-chapter-label{font-size:12px;color:#6B8F71;font-weight:600;letter-spacing:1.5px;margin-bottom:10px}
.q-title{font-size:26px;font-weight:700;color:#1a1a1a;line-height:1.3;margin-bottom:6px}
.q-hint{font-size:14px;color:#aaa;margin-bottom:22px;line-height:1.5}

/* Options */
.options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.opt-card{border:2px solid #EBEBEB;border-radius:16px;padding:18px 20px;font-size:17px;color:#1a1a1a;cursor:pointer;transition:border-color 0.15s,background 0.15s;line-height:1.4;min-height:56px;display:flex;align-items:center;background:#fff;user-select:none}
.opt-card:active{background:#f2f7f2;border-color:#b0ccb3}
.opt-card.selected{border-color:#4a7050;background:#f0f6f1;color:#2d5732;font-weight:600}

/* Number input */
.num-input-wrap{margin-bottom:16px}
.num-input-row{display:flex;align-items:center;gap:14px}
.num-input{border:2px solid #E0E0E0;border-radius:14px;padding:16px;font-size:26px;font-weight:600;color:#1a1a1a;width:100%;max-width:180px;outline:none;text-align:center;transition:border-color 0.15s;background:#fff;font-family:inherit}
.num-input:focus{border-color:#6B8F71}
.num-input.error{border-color:#e74c3c}
.num-unit{font-size:18px;color:#666;font-weight:500}

/* Schedule */
.schedule-rows{display:flex;flex-direction:column;gap:16px;margin-bottom:16px}
.schedule-row{display:flex;align-items:center;gap:14px}
.schedule-label{font-size:17px;color:#555;min-width:48px;font-weight:500}
.schedule-input{border:2px solid #E0E0E0;border-radius:14px;padding:14px 16px;font-size:24px;font-weight:600;color:#1a1a1a;width:100px;outline:none;text-align:center;transition:border-color 0.15s;background:#fff;font-family:inherit}
.schedule-input:focus{border-color:#6B8F71}
.schedule-suffix{font-size:17px;color:#888;font-weight:500}

/* Textarea */
.q-textarea{width:100%;border:2px solid #E0E0E0;border-radius:16px;padding:16px;font-size:16px;color:#1a1a1a;line-height:1.6;resize:none;outline:none;min-height:120px;font-family:inherit;transition:border-color 0.15s;background:#fff;margin-bottom:8px}
.q-textarea:focus{border-color:#6B8F71}
.q-text-input{width:100%;border:2px solid #E0E0E0;border-radius:14px;padding:16px 18px;font-size:18px;color:#1a1a1a;outline:none;font-family:inherit;transition:border-color 0.15s;background:#fff;margin-bottom:8px}
.q-text-input:focus{border-color:#6B8F71}
.q-text-input.error{border-color:#e74c3c}

/* Rating */
.rating-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.rating-item{background:#F7F7F7;border-radius:14px;padding:14px 16px}
.rating-item-label{font-size:15px;color:#333;margin-bottom:10px;line-height:1.4;font-weight:500}
.rating-btns{display:flex;gap:7px}
.rating-btn{flex:1;border:2px solid #E0E0E0;border-radius:10px;padding:10px 4px;font-size:13px;color:#555;cursor:pointer;text-align:center;background:#fff;min-height:48px;transition:all 0.15s;font-weight:500;line-height:1.3;font-family:inherit}
.rating-btn:active{background:#f2f7f2}
.rating-btn.selected{border-color:#4a7050;background:#4a7050;color:#fff;font-weight:700}

/* Method */
.method-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.method-row{background:#F7F7F7;border-radius:14px;padding:14px 16px}
.method-row-label{font-size:15px;color:#1a1a1a;margin-bottom:10px;font-weight:500}
.method-pills{display:flex;gap:6px;flex-wrap:wrap}
.method-pill{border:2px solid #E0E0E0;border-radius:8px;padding:8px 11px;font-size:13px;color:#555;cursor:pointer;background:#fff;min-height:40px;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;font-family:inherit}
.method-pill:active{background:#f2f7f2}
.method-pill.selected{border-color:#4a7050;background:#4a7050;color:#fff;font-weight:600}

/* Inputs (multi-field) */
.inputs-list{display:flex;flex-direction:column;gap:16px;margin-bottom:16px}
.inputs-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.inputs-label{font-size:16px;color:#555;min-width:80px;font-weight:500}
.inputs-field{border:2px solid #E0E0E0;border-radius:12px;padding:12px 14px;font-size:18px;color:#1a1a1a;width:90px;outline:none;text-align:center;transition:border-color 0.15s;background:#fff;font-family:inherit}
.inputs-field:focus{border-color:#6B8F71}
.inputs-unit{font-size:15px;color:#888}

/* Select field */
.select-group{margin-bottom:16px;margin-top:4px}
.select-group-label{font-size:16px;color:#555;margin-bottom:12px;display:block;font-weight:500}
.select-pills{display:flex;gap:8px;flex-wrap:wrap}
.select-pill{border:2px solid #E0E0E0;border-radius:12px;padding:12px 20px;font-size:16px;color:#555;cursor:pointer;background:#fff;min-height:48px;transition:all 0.15s;display:flex;align-items:center;font-family:inherit}
.select-pill:active{background:#f2f7f2}
.select-pill.selected{border-color:#4a7050;background:#f0f6f1;color:#2d5732;font-weight:600}

/* Bottom area */
.q-bottom{padding:16px 24px 40px;background:#fff;flex-shrink:0;position:relative;box-shadow:0 -1px 0 #f0f0f0}
.btn-next{width:100%;background:linear-gradient(135deg,#6B8F71,#4a7050);color:#fff;border:none;border-radius:16px;font-size:18px;font-weight:700;padding:18px;cursor:pointer;transition:opacity 0.2s;letter-spacing:0.5px;font-family:inherit}
.btn-next:active{opacity:0.85}
.btn-next.disabled{opacity:0.35;cursor:default}
.btn-skip{display:block;text-align:center;margin-top:12px;font-size:15px;color:#bbb;cursor:pointer;min-height:36px;line-height:36px}
.btn-skip:active{color:#888}

/* ===== DONE SCREEN ===== */
#screen-done{background:linear-gradient(160deg,#3d6644 0%,#6B8F71 100%);color:#fff;justify-content:center;align-items:center;padding:48px 32px;text-align:center}
.done-icon{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px}
.done-title{font-size:28px;font-weight:700;margin-bottom:12px}
.done-text{font-size:16px;opacity:0.85;line-height:1.8;max-width:300px}

/* Scrollbar hide */
.q-body::-webkit-scrollbar,.chapter-cards-wrap::-webkit-scrollbar{display:none}
.q-body,.chapter-cards-wrap{-ms-overflow-style:none;scrollbar-width:none}

/* Spacing */
.q-spacer{height:24px}
</style>
</head>
<body>
<div id="app">

  <!-- COVER -->
  <div id="screen-cover" class="screen active">
    <div class="cover-logo">大萌博士 · 睡眠实验室</div>
    <div class="cover-title">睡眠健康评估</div>
    <div class="cover-sub">找到你睡眠卡住的地方</div>
    <ul class="cover-bullets">
      <li>完成大约需要 8–12 分钟</li>
      <li>问卷不是医学诊断，而是帮助判断睡眠卡在哪里</li>
      <li>如果某部分无关，可以跳过</li>
    </ul>
    <button class="btn-start" onclick="showChapters()">开始评估</button>
  </div>

  <!-- CHAPTER OVERVIEW -->
  <div id="screen-chapters" class="screen hidden">
    <div class="chapters-header">
      <h2>评估包含 4 个章节</h2>
      <p>根据实际情况作答即可</p>
    </div>
    <div class="chapter-cards-wrap">
      <div class="chapter-card">
        <div class="chapter-num">1</div>
        <div class="chapter-info">
          <h3>先抓主问题</h3>
          <p>基本信息、你最困扰的睡眠问题与改善目标</p>
        </div>
      </div>
      <div class="chapter-card">
        <div class="chapter-num">2</div>
        <div class="chapter-info">
          <h3>睡眠基本情况</h3>
          <p>作息时间、时长、睡眠质量评分</p>
        </div>
      </div>
      <div class="chapter-card">
        <div class="chapter-num">3</div>
        <div class="chapter-info">
          <h3>影响因素</h3>
          <p>睡眠类型分析、生活习惯评估</p>
        </div>
      </div>
      <div class="chapter-card">
        <div class="chapter-num">4</div>
        <div class="chapter-info">
          <h3>方法与补充</h3>
          <p>身体信号、监测数据、药物使用、优先目标</p>
        </div>
      </div>
    </div>
    <div class="chapters-footer">
      <button class="btn-chapters-start" onclick="startSurvey()">开始</button>
    </div>
  </div>

  <!-- CHAPTER TRANSITION -->
  <div id="screen-chapter-transition" class="screen hidden">
    <div class="ct-num" id="ct-num">章节一</div>
    <div class="ct-title" id="ct-title">先抓主问题</div>
  </div>

  <!-- QUESTION SCREEN -->
  <div id="screen-question" class="screen hidden">
    <div class="top-bar">
      <div class="top-bar-row">
        <button class="btn-back" onclick="goBack()">← 返回</button>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="q-body" id="q-body"></div>
    <div class="q-bottom" id="q-bottom">
      <button class="btn-next disabled" id="btn-next" onclick="nextQuestion()">下一题</button>
    </div>
  </div>

  <!-- DONE SCREEN -->
  <div id="screen-done" class="screen hidden">
    <div class="done-icon">✓</div>
    <div class="done-title">评估已提交</div>
    <div class="done-text">感谢你的认真作答。大萌博士会根据你的情况进行分析，评估报告将通过微信发送给你。</div>
  </div>

</div>
<script>
// ===========================
// QUESTION DEFINITIONS
// ===========================
var QUESTIONS = [
  {id:'age',         ch:1, type:'number',       title:'你今年多少岁？',                    unit:'岁',    required:true},
  {id:'gender',      ch:1, type:'single',       title:'性别',                              options:['男','女','其他'],                autoAdvance:true},
  {id:'height',      ch:1, type:'number',       title:'身高',                              unit:'cm'},
  {id:'weight',      ch:1, type:'number',       title:'体重',                              unit:'kg'},
  {id:'duration',    ch:1, type:'single',       title:'睡眠问题持续多久了？',               options:['＜1个月','1-3个月','3-12个月','＞1年'],  autoAdvance:true},
  {id:'problems',    ch:1, type:'multi',        title:'最困扰你的睡眠问题',                hint:'可多选',
    options:['入睡困难','夜里容易醒','凌晨/清晨容易醒','睡得浅/梦多','睡了也不恢复','白天状态差','睡眠忽好忽坏','一调整或吃补剂就更乱'],
    hasMain:true},
  {id:'improve',     ch:1, type:'multi',        title:'你最想先改善什么？',                hint:'可多选',
    options:['更快睡着','夜里少醒','醒后更容易再睡','不要太早醒','醒来更清爽','白天更有精神','减少对药物/补剂的依赖','先稳定，不要越调越乱'],
    hasMain:true},
  {id:'worry',       ch:1, type:'textarea',     title:'最担心的后果是什么？',              hint:'例：长期好不了、影响工作、依赖药物',  placeholder:'请填写...',  skippable:true},
  {id:'daytime',     ch:1, type:'textarea',     title:'最希望先改善的白天状态或身体感受',  hint:'例：早上清爽、白天精神、情绪稳定',    placeholder:'请填写...',  skippable:true},
  {id:'schedule',    ch:2, type:'schedule',     title:'通常的睡眠时间',                    hint:'填入大概的小时数，例如 23'},
  {id:'duration_sel',ch:2, type:'single',       title:'平均睡眠时长大约是？',              options:['＜4小时','4-6小时','6-7小时','7-8小时','＞8小时'],   autoAdvance:true},
  {id:'stability',   ch:2, type:'single',       title:'你的作息稳定吗？',                  options:['基本稳定','工作日稳定，周末明显后移','经常不固定','倒班/夜班/经常跨时区'],   autoAdvance:true},
  {id:'scores_a',    ch:2, type:'rating',       title:'睡眠评分（上）',                    hint:'0=基本没有  1=偶尔  2=经常',
    items:[
      {id:'s1', label:'入睡超过30分钟'},
      {id:'s2', label:'夜里醒来2次或以上'},
      {id:'s3', label:'醒后超过30分钟难再睡'},
      {id:'s4', label:'凌晨/清晨比预期早醒1小时以上'},
      {id:'s5', label:'睡得浅，容易被声音、光、温度影响'},
      {id:'s6', label:'梦多、梦清晰，像在处理事情'},
    ]},
  {id:'scores_b',    ch:2, type:'rating',       title:'睡眠评分（下）',                    hint:'0=基本没有  1=偶尔  2=经常',
    items:[
      {id:'s7',  label:'梦多但很碎，醒后记不清具体内容'},
      {id:'s8',  label:'睡够了但不解乏'},
      {id:'s9',  label:'白天困、低迷、启动慢'},
      {id:'s10', label:'白天低迷但晚上反而清醒'},
      {id:'s11', label:'睡眠忽好忽坏，受变量影响很大'},
    ]},
  {id:'type_pre',    ch:3, type:'multi',        title:'睡前/入睡时，你更像哪种？',         hint:'可多选',
    options:['脑子停不下来：想事、复盘、计划、担心','身体放不松：紧、心跳、心慌、像待命','对环境敏感：声音、光、温度影响明显','晚上反而精神：越到晚上越清醒','越累越睡不着：很累但睡不进去'],
    hasMain:true},
  {id:'type_night',  ch:3, type:'multi',        title:'夜里醒来时，你更像哪种？',          hint:'可多选',
    options:['夜里自然醒：原因不明确','被身体叫醒：心慌、出汗、饥饿、反酸、尿意','工作梦/情绪梦：梦很清楚像在处理事情','碎片梦：梦很多但很散，记不清内容','早醒后脑子秒上线：醒后立刻开始想事'],
    hasMain:true},
  {id:'type_post',   ch:3, type:'multi',        title:'醒后/调整后，你更像哪种？',         hint:'可多选',
    options:['睡了但像没修好：头沉、身体重、恢复不干净','一调整就乱：补剂、运动、控糖后更差'],
    hasMain:true},
  {id:'inf_a',       ch:3, type:'rating',       title:'影响因素评分（上）',                hint:'过去4周，对你睡眠的影响程度  0=无  1=有点  2=明显',
    items:[
      {id:'i1', label:'睡前刷手机、短视频、看信息'},
      {id:'i2', label:'睡前工作、学习、处理消息'},
      {id:'i3', label:'压力、责任、待命感'},
      {id:'i4', label:'咖啡、浓茶、能量饮料'},
      {id:'i5', label:'酒精、夜宵、晚餐太晚或太重'},
    ]},
  {id:'inf_b',       ch:3, type:'rating',       title:'影响因素评分（下）',                hint:'过去4周，对你睡眠的影响程度  0=无  1=有点  2=明显',
    items:[
      {id:'i6',  label:'晚间运动或运动后太兴奋'},
      {id:'i7',  label:'补剂、助眠药、保健品叠加'},
      {id:'i8',  label:'空腹、少吃主食、低碳或控糖后夜醒'},
      {id:'i9',  label:'噪音、光线、温度、湿度、床品'},
      {id:'i10', label:'出差、换环境、作息漂移'},
    ]},
  {id:'caffeine',    ch:3, type:'inputs',        title:'关于咖啡因',   skippable:true,
    fields:[{id:'caf_count',label:'每天饮用',unit:'次',placeholder:'2'},{id:'caf_latest',label:'最晚',unit:'点',placeholder:'15'}]},

var CHAPTER_NAMES = {1:'先抓主问题', 2:'睡眠基本情况', 3:'影响因素', 4:'方法与补充'};
var CHAPTER_LABELS = {1:'章节一', 2:'章节二', 3:'章节三',4:'章节四'};
var TOTAL_Q = QUESTIONS.length;

// ===========================
// STATE
// ===========================
var answers = {};
var currentQIndex = 0;
var isSubQuestion = false;
var subQParentId = null;
var currentScreen = 'cover';
var prevChapter = 0;
var navStack = [];

// ===========================
// SCREEN MANAGEMENT
// ===========================
function getScreen(id) { return document.getElementById('screen-' + id); }

function switchScreen(fromId, toId, direction) {
  var from = getScreen(fromId);
  var to = getScreen(toId);
  to.classList.remove('hidden');
  var inCls = direction === 'forward' ? 'slide-in-right' : 'slide-in-left';
  var outCls = direction === 'forward' ? 'slide-out-left' : 'slide-out-right';
  to.classList.add(inCls);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      to.classList.remove(inCls);
      to.classList.add('active');
      from.classList.add(outCls);
      setTimeout(function() {
        from.classList.remove('active', outCls);
        from.classList.add('hidden');
      }, 320);
    });
  });
  currentScreen = toId;
}

function showChapters() {
  switchScreen('cover', 'chapters', 'forward');
}

function startSurvey() {
  currentQIndex = 0;
  prevChapter = 0;
  navStack = [];
  showQuestion(0, 'forward');
}

function showChapterTransition(chNum, chName, callback) {
  document.getElementById('ct-num').textContent = CHAPTER_LABELS[chNum];
  document.getElementById('ct-title').textContent = chName;
  var from = currentScreen;
  var fromEl = getScreen(from);
  var toEl = getScreen('chapter-transition');
  toEl.classList.remove('hidden');
  toEl.classList.add('slide-in-right');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      toEl.classList.remove('slide-in-right');
      toEl.classList.add('active');
      fromEl.classList.add('slide-out-left');
      setTimeout(function() {
        fromEl.classList.remove('active', 'slide-out-left');
        fromEl.classList.add('hidden');
      }, 320);
    });
  });
  currentScreen = 'chapter-transition';
  setTimeout(function() { callback(); }, 1500);
}

// ===========================
// QUESTION RENDERING
// ===========================
function updateProgress(idx) {
  var pct = Math.round((idx / TOTAL_Q) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

function showQuestion(idx, direction) {
  if (idx >= TOTAL_Q) {
    submitSurvey();
    return;
  }
  var q = QUESTIONS[idx];
  var ch = q.ch;
  if (ch !== prevChapter && direction === 'forward') {
    prevChapter = ch;
    showChapterTransition(ch, CHAPTER_NAMES[ch], function() {
      renderAndShowQuestion(idx, direction);
    });
    return;
  }
  prevChapter = ch;
  renderAndShowQuestion(idx, direction);
}

function renderAndShowQuestion(idx, direction) {
  var q = QUESTIONS[idx];
  isSubQuestion = false;
  renderQuestion(q, idx);
  updateProgress(idx);
  var from = currentScreen;
  if (from === 'question') {
    animateQuestionContent(direction);
    return;
  }
  var fromEl = getScreen(from);
  var toEl = getScreen('question');
  toEl.classList.remove('hidden');
  var inCls = direction === 'forward' ? 'slide-in-right' : 'slide-in-left';
  var outCls = direction === 'forward' ? 'slide-out-left' : 'slide-out-right';
  toEl.classList.add(inCls);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      toEl.classList.remove(inCls);
      toEl.classList.add('active');
      fromEl.classList.add(outCls);
      setTimeout(function() {
        fromEl.classList.remove('active', outCls);
        fromEl.classList.add('hidden');
      }, 320);
    });
  });
  currentScreen = 'question';
}

function animateQuestionContent(direction) {
  var body = document.getElementById('q-body');
  var dx = direction === 'forward' ? '50px' : '-50px';
  body.style.transition = 'none';
  body.style.opacity = '0';
  body.style.transform = 'translateX(' + dx + ')';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      body.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      body.style.opacity = '1';
      body.style.transform = 'translateX(0)';
    });
  });
  body.scrollTop = 0;
}

function renderQuestion(q, idx) {
  var body = document.getElementById('q-body');
  var bottom = document.getElementById('q-bottom');
  var html = '';
  html += '<div class="q-chapter-label">' + CHAPTER_LABELS[q.ch] + ' &nbsp;' + CHAPTER_NAMES[q.ch] + '</div>';
  html += '<div class="q-title">' + escH(q.title) + '</div>';
  if (q.hint) html += '<div class="q-hint">' + escH(q.hint) + '</div>';
  if (!q.hint) html += '<div style="height:16px"></div>';

  if (q.type === 'single')        html += renderSingle(q);
  else if (q.type === 'multi')    html += renderMulti(q);
  else if (q.type === 'number')   html += renderNumber(q);
  else if (q.type === 'textarea') html += renderTextarea(q);
  else if (q.type === 'text')     html += renderTextInput(q);
  else if (q.type === 'schedule') html += renderSchedule(q);
  else if (q.type === 'rating')   html += renderRating(q);
  else if (q.type === 'method')   html += renderMethod(q);
  else if (q.type === 'inputs')   html += renderInputs(q);
  else if (q.type === 'inputs_select') html += renderInputsSelect(q);

  html += '<div class="q-spacer"></div>';
  body.innerHTML = html;

  // Bottom buttons
  var btnHtml = '<button class="btn-next disabled" id="btn-next" onclick="nextQuestion()">下一题</button>';
  if (q.skippable) {
    btnHtml += '<span class="btn-skip" onclick="skipQuestion()">跳过</span>';
  }
  bottom.innerHTML = btnHtml;

  checkReady(q);
}

// ===== RENDER HELPERS =====
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escQ(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderSingle(q) {
  var saved = answers[q.id];
  var html = '<div class="options-list">';
  q.options.forEach(function(opt) {
    var sel = saved === opt ? ' selected' : '';
    html += '<div class="opt-card' + sel + '" onclick="selectSingle(\'' + escQ(q.id) + '\',\'' + escQ(opt) + '\',' + (!!q.autoAdvance) + ',this)">' + escH(opt) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderMulti(q) {
  var saved = answers[q.id] || [];
  var html = '<div class="options-list">';
  q.options.forEach(function(opt) {
    var sel = saved.indexOf(opt) >= 0 ? ' selected' : '';
    html += '<div class="opt-card' + sel + '" onclick="selectMulti(\'' + escQ(q.id) + '\',\'' + escQ(opt) + '\',this)">' + escH(opt) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderNumber(q) {
  var saved = answers[q.id] || '';
  return '<div class="num-input-wrap"><div class="num-input-row">' +
    '<input class="num-input" id="inp-' + q.id + '" type="number" inputmode="decimal" value="' + escH(String(saved)) + '" placeholder="0" oninput="onNumInput(\'' + escQ(q.id) + '\')">' +
    '<span class="num-unit">' + escH(q.unit) + '</span></div></div>';
}

function renderTextarea(q) {
  var saved = answers[q.id] || '';
  return '<textarea class="q-textarea" id="inp-' + q.id + '" placeholder="' + escH(q.placeholder||'') + '" oninput="onTextInput(\'' + escQ(q.id) + '\')">' + escH(saved) + '</textarea>';
}

function renderTextInput(q) {
  var saved = answers[q.id] || '';
  return '<input class="q-text-input" id="inp-' + q.id + '" type="' + (q.inputType||'text') + '" value="' + escH(String(saved)) + '" placeholder="' + escH(q.placeholder||'') + '" oninput="onTextInput(\'' + escQ(q.id) + '\')">';
}

function renderSchedule(q) {
  return '<div class="schedule-rows">' +
    '<div class="schedule-row"><span class="schedule-label">上床</span><input class="schedule-input" id="inp-bed" type="number" inputmode="decimal" value="' + (answers.bed_time||'') + '" placeholder="23" oninput="onScheduleInput()"><span class="schedule-suffix">点</span></div>' +
    '<div class="schedule-row"><span class="schedule-label">睡着</span><input class="schedule-input" id="inp-sleep" type="number" inputmode="decimal" value="' + (answers.sleep_time||'') + '" placeholder="24" oninput="onScheduleInput()"><span class="schedule-suffix">点</span></div>' +
    '<div class="schedule-row"><span class="schedule-label">起床</span><input class="schedule-input" id="inp-wake" type="number" inputmode="decimal" value="' + (answers.wake_time||'') + '" placeholder="7" oninput="onScheduleInput()"><span class="schedule-suffix">点</span></div>' +
    '</div>';
}

function renderRating(q) {
  var saved = answers[q.id] || {};
  var html = '<div class="rating-list">';
  q.items.forEach(function(item) {
    var v = saved[item.id];
    html += '<div class="rating-item"><div class="rating-item-label">' + escH(item.label) + '</div><div class="rating-btns">';
    ['0','1','2'].forEach(function(val, vi) {
      var labels = ['0 基本没有','1 偶尔','2 经常'];
      var sel = v === val ? ' selected' : '';
      html += '<button class="rating-btn' + sel + '" onclick="selectRating(\'' + escQ(q.id) + '\',\'' + item.id + '\',\'' + val + '\',this)">' + labels[vi] + '</button>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function renderMethod(q) {
  var saved = answers[q.id] || {};
  var html = '<div class="method-list">';
  q.items.forEach(function(item) {
    var v = saved[item.id];
    html += '<div class="method-row"><div class="method-row-label">' + escH(item.label) + '</div><div class="method-pills">';
    q.opts.forEach(function(opt) {
      var sel = v === opt ? ' selected' : '';
      html += '<button class="method-pill' + sel + '" onclick="selectMethod(\'' + escQ(q.id) + '\',\'' + item.id + '\',\'' + escQ(opt) + '\',this)">' + escH(opt) + '</button>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function renderInputs(q) {
  var saved = answers[q.id] || {};
  var html = '<div class="inputs-list">';
  q.fields.forEach(function(f) {
    html += '<div class="inputs-row">' +
      '<span class="inputs-label">' + escH(f.label) + '</span>' +
      '<input class="inputs-field" id="inp-' + f.id + '" type="text" inputmode="decimal" value="' + escH(String(saved[f.id]||'')) + '" placeholder="' + escH(f.placeholder||'') + '" oninput="onInputsInput(\'' + escQ(q.id) + '\',\'' + f.id + '\')">' +
      '<span class="inputs-unit">' + escH(f.unit) + '</span></div>';
  });
  html += '</div>';
  return html;
}

function renderInputsSelect(q) {
  var saved = answers[q.id] || {};
  var html = '<div class="inputs-list">';
  q.fields.forEach(function(f) {
    html += '<div class="inputs-row">' +
      '<span class="inputs-label">' + escH(f.label) + '</span>' +
      '<input class="inputs-field" id="inp-' + f.id + '" type="text" inputmode="decimal" value="' + escH(String(saved[f.id]||'')) + '" placeholder="' + escH(f.placeholder||'') + '" oninput="onInputsInput(\'' + escQ(q.id) + '\',\'' + f.id + '\')">' +
      '<span class="inputs-unit">' + escH(f.unit) + '</span></div>';
  });
  html += '</div>';
  var sf = q.selectField;
  var sv = saved[sf.id];
  html += '<div class="select-group"><span class="select-group-label">' + escH(sf.label) + '</span><div class="select-pills">';
  sf.options.forEach(function(opt) {
    var sel = sv === opt ? ' selected' : '';
    html += '<button class="select-pill' + sel + '" onclick="selectSelectField(\'' + escQ(q.id) + '\',\'' + sf.id + '\',\'' + escQ(opt) + '\',this)">' + escH(opt) + '</button>';
  });
  html += '</div></div>';
  return html;
}

// ===========================
// EVENT HANDLERS
// ===========================
function selectSingle(qid, opt, autoAdv, el) {
  answers[qid] = opt;
  document.querySelectorAll('#q-body .opt-card').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected');
  enableNext();
  if (autoAdv) {
    setTimeout(function() { nextQuestion(); }, 250);
  }
}

function selectMulti(qid, opt, el) {
  if (!answers[qid]) answers[qid] = [];
  var arr = answers[qid];
  var i = arr.indexOf(opt);
  if (i >= 0) { arr.splice(i, 1); el.classList.remove('selected'); }
  else { arr.push(opt); el.classList.add('selected'); }
  checkReady(getCurrentQ());
}

function onNumInput(qid) {
  var el = document.getElementById('inp-' + qid);
  if (el) answers[qid] = el.value;
  checkReady(getCurrentQ());
}

function onTextInput(qid) {
  var el = document.getElementById('inp-' + qid);
  if (el) answers[qid] = el.value;
  checkReady(getCurrentQ());
}

function onScheduleInput() {
  var b = document.getElementById('inp-bed');
  var s = document.getElementById('inp-sleep');
  var w = document.getElementById('inp-wake');
  if (b) answers.bed_time = b.value;
  if (s) answers.sleep_time = s.value;
  if (w) answers.wake_time = w.value;
}

function selectRating(qid, itemId, val, el) {
  if (!answers[qid]) answers[qid] = {};
  answers[qid][itemId] = val;
  var row = el.closest('.rating-btns');
  row.querySelectorAll('.rating-btn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  checkReady(getCurrentQ());
}

function selectMethod(qid, itemId, opt, el) {
  if (!answers[qid]) answers[qid] = {};
  answers[qid][itemId] = opt;
  var row = el.closest('.method-pills');
  row.querySelectorAll('.method-pill').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  checkReady(getCurrentQ());
}

function onInputsInput(qid, fid) {
  if (!answers[qid]) answers[qid] = {};
  var el = document.getElementById('inp-' + fid);
  if (el) answers[qid][fid] = el.value;
}

function selectSelectField(qid, fid, opt, el) {
  if (!answers[qid]) answers[qid] = {};
  answers[qid][fid] = opt;
  var group = el.closest('.select-pills');
  group.querySelectorAll('.select-pill').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
}

// ===========================
// READY CHECK
// ===========================
function getCurrentQ() { return QUESTIONS[currentQIndex]; }

function enableNext() {
  var btn = document.getElementById('btn-next');
  if (btn) { btn.classList.remove('disabled'); btn.disabled = false; }
}

function disableNext() {
  var btn = document.getElementById('btn-next');
  if (btn) { btn.classList.add('disabled'); btn.disabled = true; }
}

function checkReady(q) {
  if (!q) return;
  var ready = false;
  if (q.type === 'single') {
    ready = !!answers[q.id];
  } else if (q.type === 'multi') {
    ready = true; // always allow next (0 selections = valid, skip optional)
  } else if (q.type === 'number') {
    if (q.required) ready = !!(answers[q.id] && String(answers[q.id]).trim() !== '');
    else ready = true;
  } else if (q.type === 'textarea') {
    ready = true;
  } else if (q.type === 'text') {
    if (q.required) ready = !!(answers[q.id] && String(answers[q.id]).trim() !== '');
    else ready = true;
  } else if (q.type === 'schedule') {
    ready = true;
  } else if (q.type === 'rating') {
    var saved = answers[q.id] || {};
    ready = q.items.every(function(item) { return saved[item.id] != null; });
  } else if (q.type === 'method') {
    var saved2 = answers[q.id] || {};
    ready = q.items.every(function(item) { return saved2[item.id] != null; });
  } else if (q.type === 'inputs' || q.type === 'inputs_select') {
    ready = true;
  }
  if (ready) enableNext(); else disableNext();
}

// ===========================
// NAVIGATION
// ===========================
function nextQuestion() {
  var btn = document.getElementById('btn-next');
  if (btn && btn.disabled) return;

  var q = QUESTIONS[currentQIndex];

  // Validate required text/number
  if (q.required && (q.type === 'text' || q.type === 'number')) {
    var val = answers[q.id];
    if (!val || String(val).trim() === '') {
      var el = document.getElementById('inp-' + q.id);
      if (el) {
        el.classList.add('error');
        setTimeout(function() { el.classList.remove('error'); }, 1000);
      }
      return;
    }
  }

  // Sub-question mode: advance to next real question
  if (isSubQuestion) {
    isSubQuestion = false;
    currentQIndex++;
    showQuestion(currentQIndex, 'forward');
    return;
  }

  // hasMain: show sub-screen if ≥2 options selected
  if (q.hasMain) {
    var selected = answers[q.id] || [];
    if (selected.length >= 2) {
      navStack.push({qIndex: currentQIndex, prevChapter: prevChapter});
      showMainSubQuestion(q, selected);
      return;
    }
    if (selected.length === 1) {
      answers[q.id + '_main'] = selected[0];
    }
  }

  navStack.push({qIndex: currentQIndex, prevChapter: prevChapter});
  currentQIndex++;
  showQuestion(currentQIndex, 'forward');
}

function showMainSubQuestion(parentQ, selected) {
  isSubQuestion = true;
  subQParentId = parentQ.id;

  var body = document.getElementById('q-body');
  var bottom = document.getElementById('q-bottom');

  var html = '<div class="q-chapter-label">' + CHAPTER_LABELS[parentQ.ch] + ' &nbsp;' + CHAPTER_NAMES[parentQ.ch] + '</div>';
  html += '<div class="q-title">其中最主要的是？</div>';
  html += '<div class="q-hint">请选最多1-2项</div>';
  html += '<div class="options-list">';
  var savedMain = answers[parentQ.id + '_main'];
  selected.forEach(function(opt) {
    var sel = savedMain === opt ? ' selected' : '';
    html += '<div class="opt-card' + sel + '" onclick="selectMainSub(\'' + escQ(opt) + '\',this)">' + escH(opt) + '</div>';
  });
  html += '</div><div class="q-spacer"></div>';
  body.innerHTML = html;
  bottom.innerHTML = '<button class="btn-next disabled" id="btn-next" onclick="nextQuestion()">下一题</button>';
  animateQuestionContent('forward');
}

function selectMainSub(opt, el) {
  answers[subQParentId + '_main'] = opt;
  document.querySelectorAll('#q-body .opt-card').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected');
  enableNext();
  setTimeout(function() { nextQuestion(); }, 250);
}

function skipQuestion() {
  navStack.push({qIndex: currentQIndex, prevChapter: prevChapter});
  currentQIndex++;
  showQuestion(currentQIndex, 'forward');
}

function goBack() {
  if (isSubQuestion) {
    // Go back from sub-question to parent
    isSubQuestion = false;
    renderQuestion(QUESTIONS[currentQIndex], currentQIndex);
    animateQuestionContent('backward');
    return;
  }

  if (navStack.length === 0) {
    // Go back to chapters
    prevChapter = 0;
    switchScreen(currentScreen, 'chapters', 'backward');
    currentQIndex = 0;
    return;
  }

  var prev = navStack.pop();
  currentQIndex = prev.qIndex;
  prevChapter = prev.prevChapter;
  var q = QUESTIONS[currentQIndex];
  renderQuestion(q, currentQIndex);
  updateProgress(currentQIndex);
  animateQuestionContent('backward');
}

// ===========================
// FEISHU FIELD MAPPING
// ===========================
function buildFields(a) {
  var fields = {};

  if (a.age)    fields['年龄']          = Number(a.age);
  if (a.gender) fields['性别']          = a.gender;
  if (a.height) fields['身高cm']        = Number(a.height);
  if (a.weight) fields['体重kg']        = Number(a.weight);
  if (a.duration) fields['睡眠问题持续时间'] = a.duration;

  if (a.problems && a.problems.length) fields['最困扰的问题']   = a.problems;
  if (a.problems_main)                 fields['最困扰的问题_主'] = a.problems_main;
  if (a.improve && a.improve.length)   fields['最想先改善']      = a.improve;
  if (a.improve_main)                  fields['最想先改善_主']   = a.improve_main;

  var schedParts = [];
  if (a.bed_time)   schedParts.push('上床:' + a.bed_time + '点');
  if (a.sleep_time) schedParts.push('睡着:' + a.sleep_time + '点');
  if (a.wake_time)  schedParts.push('起床:' + a.wake_time + '点');
  if (a.duration_sel) schedParts.push('时长:' + a.duration_sel);
  if (a.stability)    schedParts.push('作息:' + a.stability);
  if (schedParts.length) fields['作息情况'] = schedParts.join(' / ');

  var sa = a.scores_a || {}; var sb = a.scores_b || {};
  if (sa.s1 != null) fields['睡眠1_入睡超30分钟']    = Number(sa.s1);
  if (sa.s2 != null) fields['睡眠2_夜醒2次以上']      = Number(sa.s2);
  if (sa.s3 != null) fields['睡眠3_醒后难再睡']       = Number(sa.s3);
  if (sa.s4 != null) fields['睡眠4_比预期早醒1小时']  = Number(sa.s4);
  if (sa.s5 != null) fields['睡眠5_睡浅易受干扰']     = Number(sa.s5);
  if (sa.s6 != null) fields['睡眠6_梦多梦清晰']       = Number(sa.s6);
  if (sb.s8 != null) fields['睡眠7_睡够不解乏']       = Number(sb.s8);
  if (sb.s9 != null) fields['睡眠8_白天困低迷启动慢'] = Number(sb.s9);
  if (sb.s10 != null) fields['睡眠9_白天低迷晚上清醒'] = Number(sb.s10);
  if (sb.s11 != null) fields['睡眠10_睡眠忽好忽坏']   = Number(sb.s11);

  if (a.type_pre && a.type_pre.length)   fields['睡前入睡时更像']    = a.type_pre;
  if (a.type_pre_main)                   fields['睡前入睡时更像_主'] = a.type_pre_main;
  if (a.type_night && a.type_night.length) fields['夜间醒来时更像']    = a.type_night;
  if (a.type_night_main)                   fields['夜间醒来时更像_主'] = a.type_night_main;
  if (a.type_post && a.type_post.length)   fields['醒后调整后更像']    = a.type_post;
  if (a.type_post_main)                    fields['醒后调整后更像_主'] = a.type_post_main;

  var ia = a.inf_a || {}; var ib = a.inf_b || {};
  if (ia.i1 != null) fields['影响1_睡前刷手机短视频']     = Number(ia.i1);
  if (ia.i2 != null) fields['影响2_睡前工作处理消息']     = Number(ia.i2);
  if (ia.i3 != null) fields['影响3_压力责任待命感']       = Number(ia.i3);
  if (ia.i4 != null) fields['影响4_咖啡浓茶能量饮料']     = Number(ia.i4);
  if (ia.i5 != null) fields['影响5_酒精夜宵晚餐太重']     = Number(ia.i5);
  if (ib.i6 != null) fields['影响6_晚间运动']             = Number(ib.i6);
  if (ib.i7 != null) fields['影响7_补剂助眠药叠加']       = Number(ib.i7);
  if (ib.i8 != null) fields['影响8_空腹低碳控糖后夜醒']   = Number(ib.i8);
  if (ib.i9 != null) fields['影响9_噪音光线温度湿度']     = Number(ib.i9);
  if (ib.i10 != null) fields['影响10_出差换环境作息漂移'] = Number(ib.i10);

  var lifeParts = [];
  var caf = a.caffeine || {};
  if (caf.caf_count) lifeParts.push('咖啡因' + caf.caf_count + '次/天,最晚' + (caf.caf_latest||'?') + '点');
  var alc = a.alcohol || {};
  if (alc.alc_count) lifeParts.push('饮酒' + alc.alc_count + '次/周,晚上饮酒:' + (alc.alc_eve||'?'));
  var exe = a.exercise || {};
  if (exe.exe_count) lifeParts.push('运动' + exe.exe_count + '次/周,最晚' + (exe.exe_latest||'?') + '点');
  var diet = a.diet || {};
  if (diet.dinner_time) lifeParts.push('晚餐' + diet.dinner_time + '点');
  if (diet.snack)       lifeParts.push('睡前吃东西:' + diet.snack);
  if (lifeParts.length) fields['生活习惯'] = lifeParts.join(' | ');

  if (a.body && a.body.length) fields['身体信号']   = a.body;
  if (a.body_main)             fields['身体信号_主'] = a.body_main;

  if (a.monitor && a.monitor.length) fields['监测结果'] = a.monitor;
  var mon = a.mon_data || {}; var monParts = [];
  if (mon.mon_total) monParts.push('总睡眠' + mon.mon_total + 'h');
  if (mon.mon_deep)  monParts.push('深睡' + mon.mon_deep + 'h');
  if (mon.mon_rem)   monParts.push('REM' + mon.mon_rem + 'h');
  if (monParts.length) fields['监测数据'] = monParts.join(' / ');

  var mMap = {m1:'方法1_早睡调整作息',m2:'方法2_减少手机降光',m3:'方法3_泡脚热水澡',
    m4:'方法4_呼吸冥想身体扫描',m5:'方法5_运动',m6:'方法6_调整饮食控糖',
    m7:'方法7_助眠补剂保健品',m8:'方法8_助眠药安眠药'};
  var ma = a.methods_a || {}; var mb = a.methods_b || {};
  var allM = Object.assign({}, ma, mb);
  Object.keys(allM).forEach(function(k) {
    if (mMap[k] && allM[k]) fields[mMap[k]] = allM[k];
  });
  if (a.m_good) fields['确定有帮助的方法'] = a.m_good;
  if (a.m_bad)  fields['确定不适合的方法'] = a.m_bad;

  if (a.meds) fields['助眠药使用'] = a.meds;
  if (a.meds_issue && a.meds_issue.length) fields['药物使用问题'] = a.meds_issue;
  if (a.risks && a.risks.length)           fields['风险信号']     = a.risks;

  if (a.priority && a.priority.length) fields['方案偏向'] = a.priority;
  if (a.priority_main) fields['方案偏向'] = a.priority_main;

  var extraParts = [];
  if (a.worry)   extraParts.push('最担心的后果：' + a.worry);
  if (a.daytime) extraParts.push('最希望改善：' + a.daytime);
  if (a.other)   extraParts.push('补充：' + a.other);
  if (a.phone)   extraParts.push('手机：' + a.phone);
  if (extraParts.length) fields['其他补充'] = extraParts.join('\n');

  if (a.wechat) fields['姓名标识'] = a.wechat;

  return fields;
}

// ===========================
// SUBMISSION
// ===========================
function submitSurvey() {
  // Transition to question screen if needed, then show loading
  // Just go straight to submitting with a loading overlay on the last screen
  var fields = buildFields(answers);

  // Show the done screen with a "submitting" state, then update
  var doneEl = getScreen('done');
  doneEl.querySelector('.done-title').textContent = '提交中...';
  doneEl.querySelector('.done-text').textContent = '正在保存你的评估数据，请稍候...';
  doneEl.querySelector('.done-icon').textContent = '⏳';
  switchScreen(currentScreen, 'done', 'forward');

  fetch('https://sleep-survey.terryrausch110.workers.dev/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({fields: fields})
  }).then(function(res) {
    doneEl.querySelector('.done-title').textContent = '评估已提交';
    doneEl.querySelector('.done-text').textContent = '感谢你的认真作答。大萌博士会根据你的情况进行分析，评估报告将通过微信发送给你。';
    doneEl.querySelector('.done-icon').textContent = '✓';
  }).catch(function(e) {
    // Still show done but note error
    doneEl.querySelector('.done-title').textContent = '提交遇到问题';
    doneEl.querySelector('.done-text').textContent = '网络可能不稳定，请截图本页面并通过微信联系大萌博士。\n错误：' + e.message;
    doneEl.querySelector('.done-icon').textContent = '!';
  });
}
